name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 9 * * 1,4"

  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Acessar projetos e buckets Supabase
        env:
          SUPABASE_PROJECTS: ${{ secrets.SUPABASE_PROJECTS }}
        run: |
          node <<'NODE'
          const projects = JSON.parse(process.env.SUPABASE_PROJECTS || "[]");

          if (!Array.isArray(projects) || projects.length === 0) {
            throw new Error("SUPABASE_PROJECTS precisa ser um array JSON com pelo menos 1 projeto.");
          }

          let failed = 0;
          let skipped = 0;
          let success = 0;

          for (const project of projects) {
            const name = project.name || "sem-nome";
            const url = String(project.url || "").replace(/\/$/, "");
            const anonKey = project.anonKey;

            const buckets = Array.isArray(project.buckets)
              ? project.buckets
              : project.bucket
                ? [project.bucket]
                : [];

            if (!url) {
              console.error(`❌ ${name}: faltando url.`);
              failed++;
              continue;
            }

            if (!anonKey) {
              console.warn(`⚠️ ${name}: sem anonKey/publishable key. Projeto ignorado.`);
              skipped++;
              continue;
            }

            if (buckets.length === 0) {
              console.warn(`⚠️ ${name}: nenhum bucket informado. Projeto ignorado.`);
              skipped++;
              continue;
            }

            for (const bucket of buckets) {
              const endpoint = `${url}/storage/v1/object/list/${encodeURIComponent(bucket)}`;

              try {
                const response = await fetch(endpoint, {
                  method: "POST",
                  headers: {
                    "apikey": anonKey,
                    "Authorization": `Bearer ${anonKey}`,
                    "Content-Type": "application/json"
                  },
                  body: JSON.stringify({
                    prefix: "",
                    limit: 1,
                    offset: 0
                  })
                });

                const text = await response.text();

                if (response.ok) {
                  console.log(`✅ ${name} / ${bucket}: OK`);
                  success++;
                } else {
                  console.error(`❌ ${name} / ${bucket}: HTTP ${response.status}`);
                  console.error(text);
                  failed++;
                }
              } catch (error) {
                console.error(`❌ ${name} / ${bucket}: falha ao acessar.`);
                console.error(error);
                failed++;
              }
            }
          }

          console.log("");
          console.log(`Resumo: ${success} acesso(s) OK, ${skipped} ignorado(s), ${failed} erro(s).`);

          if (failed > 0) {
            process.exit(1);
          }
          NODE
