name: Supabase Storage Keep Alive

on:
  schedule:
    - cron: "0 9 * * 1,4"

  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Criar e apagar arquivo nos buckets
        env:
          SUPABASE_PROJECTS: ${{ secrets.SUPABASE_PROJECTS }}
        run: |
          node <<'NODE'
          async function main() {
            const projects = JSON.parse(process.env.SUPABASE_PROJECTS || "[]");

            if (!Array.isArray(projects) || projects.length === 0) {
              throw new Error("SUPABASE_PROJECTS precisa ser um array JSON com pelo menos 1 projeto.");
            }

            let failed = 0;
            let skipped = 0;
            let success = 0;

            function ok(message) {
              console.log(`OK ${message}`);
              success++;
            }

            function warn(message) {
              console.warn(`AVISO ${message}`);
              skipped++;
            }

            async function fail(message, response) {
              console.error(`ERRO ${message}`);

              if (response) {
                try {
                  const text = await response.text();
                  console.error(text);
                } catch (error) {
                  console.error(error);
                }
              }

              failed++;
            }

            for (const project of projects) {
              const name = project.name || "sem-nome";
              const url = String(project.url || "").replace(/\/$/, "");
              const anonKey = project.anonKey;

              const buckets = Array.isArray(project.buckets)
                ? project.buckets
                : project.bucket
                  ? [project.bucket]
                  : [];

              if (!url) {
                console.error(`ERRO ${name}: faltando url.`);
                failed++;
                continue;
              }

              if (!anonKey) {
                warn(`${name}: sem anonKey/publishable key. Projeto ignorado.`);
                continue;
              }

              if (buckets.length === 0) {
                warn(`${name}: nenhum bucket informado. Projeto ignorado.`);
                continue;
              }

              for (const bucket of buckets) {
                const fileName = `keepalive-${Date.now()}-${Math.random().toString(36).slice(2)}.txt`;
                const filePath = `_keepalive/${fileName}`;
                const fileContent = `keepalive ${name} / ${bucket} / ${new Date().toISOString()}`;

                const encodedPath = filePath
                  .split("/")
                  .map(encodeURIComponent)
                  .join("/");

                const uploadEndpoint = `${url}/storage/v1/object/${encodeURIComponent(bucket)}/${encodedPath}`;
                const listEndpoint = `${url}/storage/v1/object/list/${encodeURIComponent(bucket)}`;
                const deleteEndpoint = `${url}/storage/v1/object/${encodeURIComponent(bucket)}/${encodedPath}`;

                const headers = {
                  "apikey": anonKey,
                  "Authorization": `Bearer ${anonKey}`
                };

                try {
                  const uploadResponse = await fetch(uploadEndpoint, {
                    method: "POST",
                    headers: {
                      ...headers,
                      "Content-Type": "text/plain"
                    },
                    body: fileContent
                  });

                  if (!uploadResponse.ok) {
                    await fail(`${name} / ${bucket}: falha ao criar arquivo. HTTP ${uploadResponse.status}`, uploadResponse);
                    continue;
                  }

                  ok(`${name} / ${bucket}: arquivo criado.`);

                  const listResponse = await fetch(listEndpoint, {
                    method: "POST",
                    headers: {
                      ...headers,
                      "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                      prefix: "_keepalive",
                      limit: 1,
                      offset: 0
                    })
                  });

                  if (!listResponse.ok) {
                    await fail(`${name} / ${bucket}: falha ao listar pasta _keepalive. HTTP ${listResponse.status}`, listResponse);
                  } else {
                    ok(`${name} / ${bucket}: pasta _keepalive listada.`);
                  }

                  const deleteResponse = await fetch(deleteEndpoint, {
                    method: "DELETE",
                    headers
                  });

                  if (!deleteResponse.ok) {
                    await fail(`${name} / ${bucket}: arquivo criado, mas falhou ao apagar. HTTP ${deleteResponse.status}`, deleteResponse);
                  } else {
                    ok(`${name} / ${bucket}: arquivo apagado.`);
                  }
                } catch (error) {
                  console.error(`ERRO ${name} / ${bucket}: falha inesperada.`);
                  console.error(error);
                  failed++;
                }
              }
            }

            console.log("");
            console.log(`Resumo: ${success} operação(ões) OK, ${skipped} ignorado(s), ${failed} erro(s).`);

            if (failed > 0) {
              process.exit(1);
            }
          }

          main().catch((error) => {
            console.error("ERRO GERAL:");
            console.error(error);
            process.exit(1);
          });
          NODE
